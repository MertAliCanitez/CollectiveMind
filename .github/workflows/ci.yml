name: CI

on:
  pull_request:
    branches: [main]
  # Push to main is gated by branch protection — CI runs on the PR.
  # This push trigger keeps the main branch status badge green after merge.
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  # Placeholder values — real secrets come from GitHub repo settings
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/collectivemind_test"
  TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/collectivemind_test"
  # Clerk values required for type-check to pass (not real credentials)
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
  CLERK_SECRET_KEY: "sk_test_placeholder"

# ─────────────────────────────────────────────────────────────────────────────
# Reusable setup steps are expressed as a composite action (actions/checkout +
# pnpm + node + install + db:generate) that every job repeats.
# This keeps jobs independent so they can run in parallel and be required
# separately in branch protection rules.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint
  # Required check: "Lint"
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm turbo lint

  # ─────────────────────────────────────────────────────────────
  # Format check
  # Required check: "Format"
  # ─────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  # ─────────────────────────────────────────────────────────────
  # Type Check
  # Required check: "Type Check"
  # ─────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type check
        run: pnpm turbo type-check

  # ─────────────────────────────────────────────────────────────
  # Prisma Schema Validation
  # Required check: "Prisma Schema"
  # ─────────────────────────────────────────────────────────────
  prisma-validate:
    name: Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate schema
        run: pnpm db:validate

  # ─────────────────────────────────────────────────────────────
  # Unit + Integration Tests
  # Required check: "Tests"
  # Depends on the fast checks above so failures surface quickly.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check, prisma-validate]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collectivemind_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations on test DB
        run: pnpm db:migrate:deploy

      - name: Run tests
        run: pnpm turbo test

  # ─────────────────────────────────────────────────────────────
  # Build
  # Required check: "Build"
  # Final gate — confirms the full monorepo compiles cleanly.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, prisma-validate]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm turbo build
        env:
          # Build-time Next.js public env vars must be present even as placeholders
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_DASHBOARD_URL: "http://localhost:3001"
